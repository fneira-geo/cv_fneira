resumen: >
  Ingeniero en Recursos Naturales Renovables con más de 15 años de experiencia
  en agroclimatología, análisis geoespacial y evaluación de recursos hídricos.
  Especializado en análisis climático y geomática aplicada a agricultura
  y modelación de demanda hídrica, con foco en adaptación al cambio climático.
  Colaborador técnico en programa NASA Develop 2022; coautor en dos publicaciones
  (Sustainable Horizons, 2022; Remote Sensing, 2024). Formación en Ciencia de Datos (2024)
  y Geomática (2021), aplicadas a modelación ambiental, teledetección y análisis climático.


# resumen linkedin: >
#   Como ingeniero en Recursos Naturales y profesional de proyecto en el Centro de 
#   Información de Recursos Naturales (Ciren), aporto más de seis años de experiencia
#   en proyectos relacionados con erosión y recursos naturales. Mi trabajo se centra 
#   en el manejo de herramientas como Google Earth y programación, colaborando con
#   equipos multidisciplinarios para abordar desafíos complejos en la gestión 
#   ambiental.
  
#   Mi enfoque está en aplicar competencias en trabajo en equipo, análisis geoespacial 
#   y geomática para generar soluciones prácticas y efectivas. Estoy motivado por la 
#   oportunidad de contribuir al desarrollo sostenible y la toma de decisiones informadas 
#   en el ámbito de los recursos naturales.

# resumen linkedin 2: >
#   Trabajo en el cruce entre clima, agua y territorio. Durante más de 15 años he desarrollado 
#   análisis geoespaciales y modelos aplicados a agricultura, recursos hídricos y cambio 
#   climático — primero en la Universidad de Chile y la UC, y desde 2020 en CIREN, donde genero 
#   información de base para evaluar potencial productivo agrícola en distintas regiones del país.
  
#   Me interesa especialmente la estimación de demanda hídrica y el análisis de cómo los escenarios 
#   climáticos futuros afectan lo que se puede cultivar, con cuánta agua, y en qué zonas. 
#   Eso incluye tanto el diagnóstico de condiciones actuales como preguntarse qué cultivos tienen 
#   futuro en un territorio que está cambiando — o cuáles deberían reemplazarse. He trabajado en 
#   proyectos que van desde zonificación agroclimática hasta diagnósticos post-incendio, pasando 
#   por estudios de oferta y demanda de agua en cuencas del norte y centro de Chile.
  
#   En los últimos años he integrado Python, R y Google Earth Engine al flujo de trabajo habitual,
#   lo que ha cambiado bastante cómo abordo los análisis.

