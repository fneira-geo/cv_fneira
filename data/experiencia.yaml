- cargo: Profesional de Proyectos, Unidad de Agroclima
  institucion: CIREN, Centro de Información de Recursos Naturales
  ubicacion: Santiago, Chile
  inicio: "2020-03"
  fin: presente
  incluir_exec: true
  proyectos:
    - nombre: Programa Ministerial de Generación de Información Base
      codigo: ""
      periodo: "2020 – presente"
      descripcion: >
        Actualización, generación e integración de información de suelos, clima
        y aguas para determinar potencial productivo agrícola bajo condiciones
        climáticas actuales y futuras. Regiones de Valparaíso (2020),
        Coquimbo (2021), Atacama (2022), O'Higgins (2023), Metropolitana (2024),
        Ñuble (2025) y Los Ríos (2026).

    - nombre: Análisis de la demanda hídrica en los territorios de las comunidades atacameñas de Borde Sureste (Toconao, Talabre, Camar, Socaire y Peine)
      codigo: ""
      periodo: "septiembre 2025 – enero 2026"
      descripcion: >
        Estimación de demanda hídrica para comunidades atacameñas del borde sureste del Salar de Atacama. 
        Mediante el uso del método FAO56, y análisis de escenarios climáticos a partir de datos disponibles 
        en ARCLIM del MMA. Se generó una evaluación de los principales cultivos, periodos de mayor 
        demanda hídrica (fenología), evaluación de consumo en condiciones ideales por parte de los cultivos.
        La escala entregada de los resultados, fue a nivel predial. Como resultado se entregó una representación 
        de los valores de demanda agrícola de las comunidades, considerando un escenario climático moderado 
        (SSP2 4.5) y un escenario climático pesimista (SSP5 8.5). Levantamiento de uso de suelo mediante vuelos de dron.


    - nombre: Relación oferta-demanda de agua de riego, cuencas Limarí y Choapa
      codigo: CONYCIT-8525FSEQ210037
      periodo: "2022 – agosto 2023"
      descripcion: >
        Recopilación y análisis de matriz de cultivos, interpolación espacial de
        variables climáticas, estimación de demanda hídrica. Coordinación del
        componente técnico del proyecto.

    - nombre: Transferencia de impactos de Embalses ante Cambio Climático
      codigo: COD. BIP 400035909-0
      periodo: "2022 – diciembre 2023"
      descripcion: >
        Estimación de condiciones actuales para agricultura, evaluación de
        demanda hídrica bajo escenarios de cambio climático. Análisis de cambios
        en aptitud agrícola de cultivos bajo riego.

    - nombre: "NASA Develop: Crop Coefficients Using Remote Sensing, Maipo Basin"
      codigo: ""
      periodo: "2022"
      descripcion: >
        Contraparte técnica del programa NASA Develop. Estimación de
        coeficientes de cultivo (Kc) mediante sensores remotos para mejorar
        estimación de demanda hídrica.

    - nombre: Estudio de Erosión Macrozona Sur
      codigo: ""
      periodo: "julio 2021 – diciembre 2021"
      descripcion: >
        Regiones de la Araucanía, Los Ríos y Los Lagos. Estimación e
        interpolación del factor de erosividad de la lluvia mediante RUSLE.

    - nombre: Análisis de Oferta Hídrica, Macrozona Centro-Sur
      codigo: ""
      periodo: "diciembre 2020 – agosto 2021"
      descripcion: >
        Regiones Metropolitana, O'Higgins y Maule (cuencas Maipo, Rapel, Maule,
        Mataquito). Determinación de superficies efectivamente regadas,
        interpolación de variables climáticas para demanda hídrica.

    - nombre: Potencial Apibotánico, Comuna de Til Til
      codigo: FIA UDE-2020-030
      periodo: "julio 2020 – enero 2022"
      descripcion: >
        Levantamiento de línea base de flora, generación de base de datos
        apícola, estimación espacial de potenciales apibotánicos.

    - nombre: Zonificación aptitud productiva agropecuaria, Magallanes
      codigo: FIA EST-2020-1415
      periodo: "julio 2020 – diciembre 2021"
      descripcion: >
        Interpolación espacial de datos climáticos y proyecciones climáticas
        para agricultura en la Región de Magallanes y Antártica Chilena.

    - nombre: Inventario de erosión post mega-incendio 2017, Región del Maule
      codigo: CORFO 19BP-117368
      periodo: "febrero 2020 – agosto 2020"
      descripcion: >
        Implementación de RUSLE para estimación de pérdida de suelo.
        Clasificación de severidad de erosión post incendios.

  # Logros consolidados para versión ejecutiva (resumen de impacto)
  logros:
    - >
      Diseñó e implementó grillas climáticas interpoladas (kriging, IDW) para
      7 regiones de Chile (+200 estaciones), integrando redes DGA, DMC e INIA
      para evaluar potencial productivo agrícola bajo escenarios actuales y de
      cambio climático.
    - >
      Apoyó como contraparte técnica en programa NASA Develop (2022): estimación de Kc 
      mediante teledetección en cuenca del Maipo. Coautoría en Goffin et al. 
      (2022), Sustainable Horizons, y Goffin et al. (2024), Remote Sensing.
    - >
      Implementó modelación de erosión hídrica (RUSLE) en 5 regiones de las
      macrozonas Centro y Sur, incluyendo diagnóstico post mega-incendios 2017
      en Región del Maule.
    - >
      Coordinó componente técnico de proyecto ANID de relación
      oferta-demanda hídrica para cuencas Limarí y Choapa (Región de Coquimbo).

